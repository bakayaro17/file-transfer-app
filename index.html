<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>File Transfer</title>
    <style>
        * { box-sizing: border-box; }

        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-2: #273449;
            --border: #334155;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --accent: #818cf8;
            --accent-2: #a78bfa;
            --accent-strong: #6366f1;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* ===== Title bar ===== */
        .titlebar {
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 0 0 14px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            -webkit-app-region: drag;
            flex-shrink: 0;
        }
        .titlebar-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            letter-spacing: 0.02em;
        }
        .titlebar-title .app-name { color: var(--text); }
        .titlebar-title .version {
            margin-left: 8px;
            font-size: 11px;
            color: var(--muted);
            opacity: 0.7;
        }
        .titlebar-controls {
            -webkit-app-region: no-drag;
            display: flex;
            height: 100%;
        }
        .tb-btn {
            width: 44px;
            height: 100%;
            border: 0;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, color 0.15s;
            padding: 0;
        }
        .tb-btn:hover { background: var(--surface); color: var(--text); }
        .tb-btn.close:hover { background: #dc2626; color: white; }
        .tb-btn svg { width: 12px; height: 12px; }

        /* ===== Main ===== */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 24px 24px 20px;
        }
        .main::-webkit-scrollbar { width: 8px; }
        .main::-webkit-scrollbar-track { background: transparent; }
        .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .main::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* ===== Update banner ===== */
        .update-banner {
            display: none;
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 10px;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #fcd34d;
            font-size: 13px;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .update-banner.visible { display: flex; }
        .update-banner.ready {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
        }
        .update-banner.error {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
        .update-banner button {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            border: 0;
            cursor: pointer;
            background: var(--success);
            color: white;
            font-weight: 500;
        }
        .update-banner button:hover { filter: brightness(1.1); }

        /* ===== Code card ===== */
        .code-card {
            background: linear-gradient(140deg, var(--surface) 0%, var(--surface-2) 100%);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px 18px 18px;
            text-align: center;
            margin-bottom: 18px;
            position: relative;
            overflow: hidden;
        }
        .code-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, var(--accent-strong), var(--accent-2));
        }
        .code-label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .code-display {
            font-family: 'Cascadia Mono', 'Consolas', 'Menlo', monospace;
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 0.18em;
            color: var(--text);
            background: rgba(99, 102, 241, 0.1);
            padding: 14px 18px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 14px;
            user-select: all;
            cursor: pointer;
            min-width: 220px;
            transition: background 0.15s;
        }
        .code-display:hover { background: rgba(99, 102, 241, 0.18); }
        .code-actions {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .code-actions button {
            flex: 1;
            max-width: 140px;
        }

        /* ===== Buttons ===== */
        button {
            padding: 9px 16px;
            border-radius: 8px;
            border: 0;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, transform 0.05s;
            font-family: inherit;
        }
        button:active { transform: scale(0.98); }
        button.primary {
            background: var(--accent-strong);
            color: white;
        }
        button.primary:hover { background: #4f46e5; }
        button.primary:disabled {
            background: var(--surface-2);
            color: var(--muted);
            cursor: not-allowed;
        }
        button.secondary {
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border);
        }
        button.secondary:hover { background: #324158; }

        /* ===== Connect section ===== */
        .section-label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .connect-section {
            margin-bottom: 18px;
        }
        .connect-row {
            display: flex;
            gap: 8px;
        }
        input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-family: 'Cascadia Mono', 'Consolas', 'Menlo', monospace;
            font-size: 14px;
            letter-spacing: 0.1em;
            outline: none;
            transition: border 0.15s;
        }
        input:focus { border-color: var(--accent-strong); }
        input::placeholder {
            color: var(--muted);
            letter-spacing: 0.05em;
        }

        /* ===== Status ===== */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 999px;
            background: var(--surface);
            border: 1px solid var(--border);
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 18px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted);
        }
        .status-pill.ready .status-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
        .status-pill.connected { color: #6ee7b7; border-color: rgba(16, 185, 129, 0.3); }
        .status-pill.connected .status-dot { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .status-pill.error { color: #fca5a5; border-color: rgba(239, 68, 68, 0.3); }
        .status-pill.error .status-dot { background: var(--error); }

        /* ===== Drop zone ===== */
        .dropzone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 32px 16px;
            text-align: center;
            background: var(--surface);
            transition: all 0.15s;
            margin-bottom: 18px;
        }
        .dropzone.dragover {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.1);
        }
        .dropzone-icon {
            width: 36px;
            height: 36px;
            margin: 0 auto 10px;
            color: var(--muted);
        }
        .dropzone h3 {
            margin: 0 0 4px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }
        .dropzone p {
            margin: 0;
            font-size: 12px;
            color: var(--muted);
        }
        .dropzone .peer-info {
            margin-top: 8px;
            font-size: 11px;
            color: var(--accent);
            font-family: 'Cascadia Mono', 'Consolas', monospace;
            letter-spacing: 0.1em;
        }

        /* ===== Files list ===== */
        .files-section h3 {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 600;
            margin: 0 0 8px;
        }
        .files-section p {
            font-size: 11px;
            color: var(--muted);
            margin: 0 0 10px;
        }
        .file-item {
            padding: 10px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            margin-bottom: 6px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: grab;
            font-size: 13px;
            transition: background 0.15s;
        }
        .file-item:hover { background: var(--surface-2); }
        .file-item:active { cursor: grabbing; }
        .file-item .name {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
        }
        .file-item .hint {
            color: var(--muted);
            font-size: 11px;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--surface-2);
            color: var(--text);
            padding: 10px 16px;
            border-radius: 999px;
            font-size: 12px;
            border: 1px solid var(--border);
            opacity: 0;
            transition: all 0.25s;
            pointer-events: none;
            z-index: 100;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div class="titlebar">
        <div class="titlebar-title">
            <span class="app-name">File Transfer</span>
            <span class="version" id="app-version"></span>
        </div>
        <div class="titlebar-controls">
            <button class="tb-btn" id="btn-minimize" title="Minimize">
                <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><line x1="2" y1="6" x2="10" y2="6"/></svg>
            </button>
            <button class="tb-btn close" id="btn-close" title="Close">
                <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><line x1="2.5" y1="2.5" x2="9.5" y2="9.5"/><line x1="9.5" y1="2.5" x2="2.5" y2="9.5"/></svg>
            </button>
        </div>
    </div>

    <div class="main">
        <div id="update-banner" class="update-banner">
            <span id="update-text"></span>
            <button id="update-install-btn" style="display:none;">Restart &amp; install</button>
        </div>

        <div class="code-card">
            <div class="code-label">Your code</div>
            <div class="code-display" id="my-id">......</div>
            <div class="code-actions">
                <button class="primary" id="copy-btn">Copy code</button>
                <button class="secondary" id="share-btn">Share link</button>
            </div>
        </div>

        <div class="connect-section">
            <div class="section-label">Connect to another device</div>
            <div class="connect-row">
                <input type="text" id="target-id" placeholder="ENTER CODE" maxlength="6" autocomplete="off" spellcheck="false">
                <button class="primary" id="connect-btn">Connect</button>
            </div>
        </div>

        <div class="status-pill" id="status-pill">
            <span class="status-dot"></span>
            <span id="status">Starting up...</span>
        </div>

        <div id="dropzone" class="dropzone" style="display: none;">
            <svg class="dropzone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <h3>Drop files here to send</h3>
            <p>or drag from File Explorer</p>
            <div class="peer-info">Connected to <span id="connected-id"></span></div>
        </div>

        <div class="files-section" id="files-section" style="display: none;">
            <h3>Received files</h3>
            <p>Drag files out to your desktop or another folder</p>
            <div id="file-list"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="node_modules/peerjs/dist/peerjs.min.js"></script>
    <script src="renderer.js"></script>
</body>
</html>
